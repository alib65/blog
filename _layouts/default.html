<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} — Ali Balighi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #08080A;
      --text-main: #F4F0EB;
      --text-dim: #888888;
      --accent-color: #ff0000;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
    }
    body::after {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      opacity: 0.04;
      pointer-events: none;
      z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }
    header {
      padding: 30px 0 20px;
      text-align: center;
      border-bottom: 1px solid rgba(244, 240, 235, 0.05);
    }
    header h1 a {
      font-family: 'Cormorant Garamond', serif;
      font-size: 48px;
      font-weight: 400;
      letter-spacing: 4px;
      color: var(--text-main);
      text-decoration: none;
    }
    nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1px;
      padding: 15px 0;
    }
    nav a {
      font-family: 'Cormorant Garamond', serif;
      color: #ffffff;
      padding: 6px 12px;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 2px;
      border: 1px solid transparent;
      transition: all 0.3s ease;
      text-transform: uppercase;
    }
    nav a:hover {
      color: var(--accent-color);
      border-color: rgba(255, 0, 0, 0.3);
      text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
      background: rgba(255, 0, 0, 0.05);
    }
    main {
      max-width: 760px;
      margin: 60px auto;
      padding: 0 30px;
    }
    h1, h2, h3 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      letter-spacing: 2px;
      color: var(--text-main);
      margin-bottom: 20px;
    }
    h1 { font-size: 42px; }
    h2 { font-size: 28px; margin-top: 40px; }
    p {
      font-size: 18px;
      line-height: 1.8;
      color: var(--text-main);
      margin-bottom: 20px;
    }
    a { color: var(--accent-color); text-decoration: none; }
    a:hover { text-shadow: 0 0 8px rgba(255,0,0,0.4); }
    .post-meta {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    .post-list { list-style: none; }
    .post-list li {
      border-bottom: 1px solid rgba(244, 240, 235, 0.05);
      padding: 30px 0;
    }
    .post-list li:first-child { padding-top: 0; }
    .post-list h2 { font-size: 26px; margin: 0 0 8px; }
    .post-list h2 a { color: var(--text-main); transition: color 0.3s; }
    .post-list h2 a:hover { color: var(--accent-color); text-shadow: none; }
    footer {
      text-align: center;
      padding: 40px;
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 2px;
      border-top: 1px solid rgba(244, 240, 235, 0.05);
      font-family: 'Space Mono', monospace;
    }
    @media (max-width: 768px) {
      header h1 a { font-size: 32px; }
      nav a { font-size: 10px; padding: 5px 8px; }
      main { padding: 0 20px; margin: 40px auto; }
    }
  </style>
</head>
<body>
  <header>
    <h1><a href="https://alibalighi.com">Ali Balighi</a></h1>
    <nav>
      <a href="https://alibalighi.com">HOME</a>
      <a href="https://alibalighi.com/about.html">ABOUT</a>
      <a href="https://alibalighi.com/music.html">MUSIC</a>
      <a href="https://alibalighi.com/scores.html">SCORES</a>
      <a href="https://alibalighi.com/articles.html">ARTICLES</a>
      <a href="https://alibalighi.com/books.html">BOOKS</a>
      <a href="https://alibalighi.com/news.html">NEWS</a>
      <a href="https://blog.alibalighi.com">BLOG</a>
      <a href="https://alibalighi.com/contact.html">CONTACT</a>
    </nav>
  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    © {{ site.time | date: "%Y" }} Ali Balighi
  </footer>
</body>
</html>
