<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} — Ali Balighi</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;700&family=Space+Mono&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #000000; /* Simple Pure Black */
      --text-main: #F4F0EB; /* Bone white */
      --text-dim: #888888;
      --accent-color: #ff0000; /* Red */
      --border-color: rgba(244, 240, 235, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* --- CORE STYLES --- */
    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
    }

    /* Page Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #000000; }
    ::-webkit-scrollbar-thumb { background: #333333; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }

    /* --- UI LAYOUT (Menu & Title) --- */
    #top-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 40px;
      padding-bottom: 20px;
      gap: 25px;
    }

    .menu {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      max-width: 90%;
    }

    .highlight {
      font-family: 'Cormorant Garamond', monospace;
      color: #ffffff;
      padding: 6px 12px;
      text-decoration: none;
      font-size: 16px;
      letter-spacing: 2px;
      border: 1px solid transparent;
      transition: all 0.3s ease;
      cursor: pointer;
      user-select: none;
      text-transform: uppercase;
    }

    .highlight:hover {
      color: var(--accent-color);
      border-color: rgba(255, 0, 0, 0.3);
      text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
      background: rgba(255, 0, 0, 0.05);
      transform: scale(1.02);
    }

    /* --- IDENTITY / TITLE STYLES --- */
    .identity { text-align: center; }
    
    .identity h1 a {
      font-family: 'Cormorant Garamond', serif;
      font-size: 54px;
      font-weight: 500;
      letter-spacing: 2px;
      color: #ffffff;
      text-decoration: none;
      line-height: 1;
    }

    .subtitle-text {
      font-family: 'Cormorant Garamond', monospace;
      font-size: 13px;
      color: #aaaaaa;
      margin-top: 12px;
      letter-spacing: 1px;
    }

    /* --- MAIN CONTENT & POST STYLES --- */
    main {
      max-width: 760px;
      margin: 20px auto 60px auto;
      padding: 0 30px;
    }

    h1, h2, h3 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      letter-spacing: 2px;
      color: var(--text-main);
      margin-bottom: 20px;
    }

    h1 { font-size: 42px; }
    h2 { font-size: 28px; margin-top: 40px; }

    main p {
      font-size: 20px;
      line-height: 1.6;
      text-align: justify;
      color: var(--text-main);
      margin-bottom: 20px;
    }

    main strong { 
      color: var(--text-main); 
      font-weight: 700; 
      letter-spacing: 1px; 
    }

    /* Link styling matched to main code */
    main a { 
      color: var(--accent-color); 
      text-decoration: none; 
      border-bottom: 1px dashed var(--accent-color);
      transition: all 0.2s;
    }
    
    main a:hover { 
      border-bottom-style: solid;
      text-shadow: 0 0 8px rgba(255, 0, 0, 0.4); 
    }

    hr {
      border: 0;
      border-top: 1px dashed var(--text-dim);
      margin: 40px 0;
    }

    /* Blog List Specific Overrides */
    .post-meta {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .post-list { list-style: none; }
    .post-list li {
      border-bottom: 1px dashed rgba(244, 240, 235, 0.15);
      padding: 30px 0;
    }
    .post-list h2 a { 
      color: var(--text-main); 
      transition: color 0.3s; 
      border-bottom: none; /* Remove dashed border for titles */
    }
    .post-list h2 a:hover { 
      color: var(--accent-color); 
      text-shadow: none; 
      border-bottom: none;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 40px;
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 2px;
      border-top: 1px solid rgba(244, 240, 235, 0.05);
      font-family: 'Space Mono', monospace;
    }

    /* --- MOBILE RESPONSIVENESS --- */
    @media (max-width: 768px) {
      #top-container { padding-top: 25px; gap: 20px; }
      
      .menu { gap: 8px; }
      
      .highlight { font-size: 10px; padding: 5px 8px; }
      
      .identity h1 a { font-size: 36px; }
      
      .subtitle-text { 
        font-size: 10px; 
        line-height: 1.4; 
        padding: 0 15px; 
      }

      main { padding: 0 20px; margin: 10px auto 40px auto; }
      main p { font-size: 18px; text-align: left; }
    }
  </style>
</head>
<body>

  <header id="top-container">
    <nav class="menu">
      <a href="https://alibalighi.com/index.html" class="highlight">HOME</a>
      <a href="https://alibalighi.com/about.html" class="highlight">ABOUT</a>
      <a href="https://alibalighi.com/music.html" class="highlight">MUSIC</a>
      <a href="https://alibalighi.com/scores.html" class="highlight">SCORES</a>
      <a href="https://alibalighi.com/articles.html" class="highlight">ARTICLES</a>
      <a href="https://alibalighi.com/books.html" class="highlight">BOOKS</a>
      <a href="https://alibalighi.com/news.html" class="highlight">NEWS</a>
      <a href="https://github.com/alib65" target="_blank" class="highlight">CODE</a>
      <a href="https://alibalighi.bandcamp.com/" target="_blank" class="highlight">BANDCAMP</a>
      <a href="https://www.youtube.com/@AliBalighi" target="_blank" class="highlight">YOUTUBE</a>
      <a href="https://electronicnights.github.io" target="_blank" class="highlight">ELECTRONIC NIGHTS</a>
      <a href="{{ '/' | relative_url }}" class="highlight">BLOG</a>
      <a href="https://alibalighi.com/contact.html" class="highlight">CONTACT</a>
    </nav>

    <div class="identity">
      <h1><a href="https://alibalighi.com">Ali Balighi</a></h1>
      <div class="subtitle-text">Composer & Scholar — electroacoustic, contemporary, and cross-cultural music</div>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    © {{ site.time | date: "%Y" }} Ali Balighi
  </footer>

</body>
</html>
