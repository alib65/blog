<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketchy Vortex</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #eeebe6; /* Paper-like off-white background */
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    let rings = [];

    // Configuration for the visual style
    const config = {
        ringCount: 200,      // How many lines to draw
        baseSpeed: 0.002,    // How fast they rotate
        roughness: 2.5,      // How jagged the lines are
        wobbleSpeed: 0.005,  // How fast the shape distorts
        color: 'rgba(10, 10, 10, 0.8)' // Dark black/charcoal with slight transparency
    };

    // The Ring class represents one sketchy loop
    class Ring {
        constructor(i) {
            this.init(i);
        }

        init(i) {
            // Calculate a radius. We want more rings in the center to make it blacker.
            // Using a power function pushes values closer to 0 (the center).
            let progress = i / config.ringCount;
            this.radius = Math.pow(progress, 1.5) * (Math.min(width, height) * 0.45);
            
            // Randomize visual properties
            this.angle = Math.random() * Math.PI * 2;
            
            // Inner rings move slightly faster than outer rings for a vortex effect
            this.speed = config.baseSpeed * (1 + (1 - progress) * 2) * (Math.random() > 0.5 ? 1 : -1); 
            
            // "Noise" factors to make the circle uneven
            this.noiseOffset = Math.random() * 1000;
            this.pointCount = 60 + Math.floor(this.radius / 2); // More detail on outer rings
            
            // Line thickness varies
            this.lineWidth = 0.5 + Math.random() * 1.5;
        }

        draw(time) {
            ctx.beginPath();
            
            // Draw the loop by connecting points around a circle
            for (let j = 0; j <= this.pointCount; j++) {
                // Determine the angle for this specific point on the ring
                let theta = (j / this.pointCount) * Math.PI * 2;
                
                // Add the rotation of the whole ring
                let actualAngle = theta + this.angle;

                // Create the "Sketchy" effect using sine waves to simulate noise
                // We combine a few sine waves to make it look irregular
                let distortion = 
                    Math.sin(theta * 5 + this.noiseOffset) * 5 + 
                    Math.cos(theta * 13 + time * 0.5) * 3 +
                    Math.sin(theta * 3 + time) * 2;

                // Scale distortion based on radius (inner rings are tighter)
                let r = this.radius + distortion * config.roughness;

                // Convert polar coordinates to cartesian (x, y)
                let x = width / 2 + Math.cos(actualAngle) * r;
                let y = height / 2 + Math.sin(actualAngle) * r;

                if (j === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            
            // Close the loop slightly imperfectly to look like a sketch
            ctx.closePath();
            ctx.strokeStyle = config.color;
            ctx.lineWidth = this.lineWidth;
            ctx.stroke();
            
            // Update rotation for next frame
            this.angle += this.speed;
        }
    }

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        
        // Re-initialize rings to fit new screen size
        rings = [];
        for (let i = 0; i < config.ringCount; i++) {
            rings.push(new Ring(i));
        }
    }

    function animate(time) {
        // Clear the canvas
        ctx.clearRect(0, 0, width, height);
        
        // Draw all rings
        let t = time * 0.001; // Convert to seconds
        rings.forEach(ring => ring.draw(t));

        requestAnimationFrame(animate);
    }

    // Initialize
    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(animate);

</script>

</body>
</html>
